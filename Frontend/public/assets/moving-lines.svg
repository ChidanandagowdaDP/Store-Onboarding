<svg width="100%" height="100%" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- dotted line style -->
    <style>
      .line {
        fill: none;
        stroke: #3b82f6;
        stroke-width: 2;
        stroke-dasharray: 6 6;
        opacity: 0.5;
        animation: moveLine 6s linear infinite;
      }

      .line2 {
        fill: none;
        stroke: #06b6d4;
        stroke-width: 2;
        stroke-dasharray: 5 5;
        opacity: 0.4;
        animation: moveLine 8s linear infinite;
      }

      .line3 {
        fill: none;
        stroke: #6366f1;
        stroke-width: 2;
        stroke-dasharray: 7 7;
        opacity: 0.4;
        animation: moveLine 10s linear infinite;
      }

      @keyframes moveLine {
        from {
          stroke-dashoffset: 0;
        }
        to {
          stroke-dashoffset: 100;
        }
      }
    </style>
  </defs>

  <!-- lines -->
  <path class="line" d="M0 450 Q200 350 400 420 T800 360 T1200 400"></path>
  <path class="line2" d="M0 380 Q200 420 400 350 T800 420 T1200 360"></path>
  <path class="line3" d="M0 500 Q300 300 600 450 T900 320 T1200 420"></path>

</svg>